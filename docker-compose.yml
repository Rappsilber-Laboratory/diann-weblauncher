version: '3.8'
services:
  diann-launcher:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./jobs:/jobs
      # Mount your research data folder to /data for DIA-NN processing
      - /data:/data
    environment:
      - PATH=/app/bin:/opt/diann:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    restart: always
