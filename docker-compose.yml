version: '3.8'
services:
  diann-launcher:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      # Map your data directory here
      - /path/to/raw/files:/data/raw
      - /path/to/save/results:/data/results
    environment:
      - PATH=/app/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    restart: always
